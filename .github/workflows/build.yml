name: Build

on:
  push:
    branches: ['**']
    tags: ['v*']

jobs:
  # Solo en tags: crea el release antes de que los builds suban archivos
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Crear Release en GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Vitaris Launcher ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            --repo Dev-Senju-M/VitarisII-Launcher

  release:
    runs-on: ${{ matrix.os }}
    needs: ${{ startsWith(github.ref, 'refs/tags/v') && 'create-release' || '' }}

    permissions:
      contents: write

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: Install Dependencies
        run: npm ci
        shell: bash

      - name: Build (sin publicar)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm run dist -- --publish never
        shell: bash

      - name: Build y publicar Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always
        shell: bash
