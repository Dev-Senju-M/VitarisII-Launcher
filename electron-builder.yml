appId: 'com.vitaris.launcher'
productName: 'Vitaris Launcher'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2026 Senju'

asar: true
compression: 'maximum'

publish:
  provider: github
  owner: Dev-Senju-M
  repo: VitarisII-Launcher
  releaseType: release

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,.eslintrc.json}'

extraResources:
  - 'libraries'

# Windows Configuration
win:
  target:
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerSidebar: 'build/installerSidebar.bmp'

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux:
  target: 'AppImage'
  maintainer: 'Senju'
  vendor: 'Vitaris'
  synopsis: 'Modded Minecraft Launcher'
  description: 'Launcher personalizado para la comunidad de Minecraft Modded Vitaris.'
  category: 'Game'

directories:
  buildResources: 'build'
  output: 'dist'
